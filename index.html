<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Attrape-moi Cartoon</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: url("https://i.imgur.com/7YVZk9P.png");
    background-size: cover;
    background-position: center;
    font-family: Arial, sans-serif;
  }

  #face {
    position: absolute;
    width: 130px;
    height: 130px;
    transition: filter 0.1s, transform 0.05s, width 0.1s, height 0.1s;
  }

  .bubble {
    position: absolute;
    background: white;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 16px;
    box-shadow: 0 0 10px black;
    animation: fadeOut 1.5s forwards;
  }

  @keyframes fadeOut {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
  }

  @keyframes shakeScreen {
    0% { transform: translate(0px, 0px); }
    25% { transform: translate(8px, -8px); }
    50% { transform: translate(-8px, 8px); }
    75% { transform: translate(8px, 8px); }
    100% { transform: translate(0px, 0px); }
  }
</style>
</head>

<body>

<img id="face" src="https://em-content.zobj.net/source/microsoft-teams/363/grinning-face_1f600.png">

<script>
  const face = document.getElementById("face");

  let x = window.innerWidth / 2;
  let y = window.innerHeight / 2;

  const messages = [
    "Dépêche-toi !",
    "Tu rêves !",
    "Trop lent !",
    "Même pas proche !",
    "Si tu m'attrapes je te paye un café !",
    "Attrape-moi si tu peux !",
    "Encore raté !",
    "Ahahah !",
    "Tu n'y arriveras jamais !",
    "Je suis trop rapide !",
    "Essaie encore !",
    "Pas aujourd'hui !"
  ];

  function placeFace() {
    face.style.left = x + "px";
    face.style.top = y + "px";
  }

  placeFace();

  function showBubble(text) {
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;
    bubble.style.left = (x + 140) + "px";
    bubble.style.top = (y - 20) + "px";
    document.body.appendChild(bubble);

    setTimeout(() => bubble.remove(), 1500);
  }

  document.addEventListener("mousemove", (e) => {
    const fx = x + 60;
    const fy = y + 60;

    const dx = e.clientX - fx;
    const dy = e.clientY - fy;

    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 260) {
      face.style.filter = "hue-rotate(330deg) saturate(3)";
      face.style.transform = `translate(${(Math.random()*12)-6}px, ${(Math.random()*12)-6}px)`;
      face.style.width = "160px";
      face.style.height = "160px";

      document.body.style.animation = "shakeScreen 0.1s infinite";

      x -= dx / 2.5;
      y -= dy / 2.5;

      x = Math.max(0, Math.min(x, window.innerWidth - 160));
      y = Math.max(0, Math.min(y, window.innerHeight - 160));

      placeFace();

      if (Math.random() < 0.10) {
        showBubble(messages[Math.floor(Math.random() * messages.length)]);
      }

    } else {
      face.style.filter = "none";
      face.style.transform = "none";
      face.style.width = "130px";
      face.style.height = "130px";
      document.body.style.animation = "none";
    }
  });

  window.addEventListener("resize", () => {
    x = Math.min(x, window.innerWidth - 130);
    y = Math.min(y, window.innerHeight - 130);
    placeFace();
  });
</script>

</body>
</html>
