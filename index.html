<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Attrape-moi Cartoon</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: none;
    font-family: Arial, sans-serif;
  }

  #bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
  }

  #face {
    position: absolute;
    width: 80px;      /* plus petit */
    height: 80px;
    transition: filter 0.05s, transform 0.05s;
    z-index: 10;
  }

  .bubble {
    position: absolute;
    background: white;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 16px;
    box-shadow: 0 0 10px black;
    animation: fadeOut 1.2s forwards;
    z-index: 20;
  }

  @keyframes fadeOut {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
  }

  @keyframes shakeScreen {
    0% { transform: translate(0px, 0px); }
    25% { transform: translate(12px, -12px); }
    50% { transform: translate(-12px, 12px); }
    75% { transform: translate(12px, 12px); }
    100% { transform: translate(0px, 0px); }
  }
</style>
</head>

<body>

<video id="bg-video" autoplay loop muted playsinline>
<source src="https://raw.githubusercontent.com/fwilczega19-ops/attrape-moi/main/6F9KlAM.mp4" type="video/mp4">
</video>

<img id="face" src="https://em-content.zobj.net/source/microsoft-teams/363/grinning-face_1f600.png">

<script>
  const face = document.getElementById("face");

  let x = window.innerWidth / 2;
  let y = window.innerHeight / 2;

  const messages = [
    "Dépêche-toi !", "Tu rêves !", "Trop lent !", "Même pas proche !",
    "Attrape-moi si tu peux !", "Encore raté !", "Ahahah !",
    "Tu n'y arriveras jamais !", "Je suis trop rapide !",
    "Essaie encore !", "Pas aujourd'hui !", "Même mon chien va plus vite",
    "Tu crois vraiment pouvoir m'avoir", "J'ai pitié de toi",
    "T'es trop nul", "Même pas en rêve"
  ];

  function placeFace() {
    face.style.left = x + "px";
    face.style.top = y + "px";
  }

  placeFace();

  function showBubble(text) {
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;
    bubble.style.left = (x + 120) + "px";
    bubble.style.top = (y - 20) + "px";
    document.body.appendChild(bubble);
    setTimeout(() => bubble.remove(), 1200);
  }

  document.addEventListener("mousemove", (e) => {
    const fx = x + 40;
    const fy = y + 40;

    const dx = e.clientX - fx;
    const dy = e.clientY - fy;

    const dist = Math.sqrt(dx*dx + dy*dy);

    /* Détection très large */
    if (dist < 500) {

      /* Téléportation anti-coin */
      if (x < 50 || y < 50 || x > window.innerWidth - 150 || y > window.innerHeight - 150) {
        x = Math.random() * (window.innerWidth - 200) + 100;
        y = Math.random() * (window.innerHeight - 200) + 100;
      }

      /* Téléportation anti-approche rapide */
      if (dist < 120) {
        x = Math.random() * (window.innerWidth - 200) + 100;
        y = Math.random() * (window.innerHeight - 200) + 100;
      }

      /* Fuite ultra rapide */
      x -= dx * 1.6;
      y -= dy * 1.6;

      /* Rebond si mur */
      if (x < 0) x = 80;
      if (y < 0) y = 80;
      if (x > window.innerWidth - 80) x = window.innerWidth - 160;
      if (y > window.innerHeight - 80) y = window.innerHeight - 160;

      placeFace();

      face.style.filter = "hue-rotate(330deg) saturate(6)";
      face.style.transform = `translate(${(Math.random()*25)-12}px, ${(Math.random()*25)-12}px)`;

      if (Math.random() < 0.25) {
        showBubble(messages[Math.floor(Math.random() * messages.length)]);
      }

      document.body.style.animation = "shakeScreen 0.1s infinite";

    } else {
      face.style.filter = "none";
      face.style.transform = "none";
      document.body.style.animation = "none";
    }
  });

  window.addEventListener("resize", () => {
    x = Math.min(x, window.innerWidth - 80);
    y = Math.min(y, window.innerHeight - 80);
    placeFace();
  });
</script>

</body>
</html>
